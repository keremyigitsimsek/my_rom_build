name: i9500_Android11_Build_V3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Gereksiz Dosyalari Sil (Disk Alanı)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          echo "Disk alanı hazır kanka!"

      - name: Derleme Paketlerini Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc python3

      - name: Repo Aracini Ayarla
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: LineageOS 18.1 Baslat
        run: |
          git config --global user.email "kerem@example.com"
          git config --global user.name "Kerem"
          repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --git-lfs
          echo "Sistem baslatildi, saniyeler akmaya hazir!"
