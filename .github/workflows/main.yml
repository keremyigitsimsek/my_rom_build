name: i9500 ROM Build (Android 11)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Sunucu Hazırlığı
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev x11proto-core-dev libx11-dev libgl1-mesa-dev g++-multilib libxml2-utils xsltproc unzip python3

      - name: Kaynak Kodları Çekiliyor (ja3g)
        run: |
          echo "Burada senin ja3g için çalışan gizli kaynakları çekeceğiz kanka!"
